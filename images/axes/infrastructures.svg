<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ede7f6"/>
      <stop offset="100%" stop-color="#d1c4e9"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#424242"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="320" fill="url(#sky)"/>
  <!-- Hills / terrain background -->
  <polygon points="0,200 80,140 180,185 280,120 400,175 520,115 640,160 640,250 0,250" fill="#4a148c" opacity="0.35"/>
  <polygon points="0,230 100,175 220,215 340,165 460,205 580,155 640,185 640,260 0,260" fill="#6a1a8a" opacity="0.4"/>
  <!-- Ground -->
  <rect x="0" y="255" width="640" height="65" fill="#4a148c" opacity="0.25"/>
  <!-- MAIN ROAD (perspective) -->
  <polygon points="260,320 380,320 500,255 140,255" fill="url(#road)"/>
  <!-- Road center line (dashes) -->
  <line x1="320" y1="320" x2="320" y2="255" stroke="#ffcc02" stroke-width="3" stroke-dasharray="15,10"/>
  <!-- Road side lines -->
  <line x1="270" y1="320" x2="148" y2="255" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="370" y1="320" x2="492" y2="255" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
  <!-- BRIDGE structure -->
  <!-- Bridge deck -->
  <rect x="80" y="195" width="180" height="18" fill="#546e7a" rx="3"/>
  <!-- Bridge towers -->
  <rect x="100" y="145" width="16" height="68" fill="#455a64"/>
  <rect x="228" y="145" width="16" height="68" fill="#455a64"/>
  <!-- Bridge cables -->
  <line x1="108" y1="145" x2="145" y2="198" stroke="#90a4ae" stroke-width="2"/>
  <line x1="108" y1="145" x2="115" y2="198" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="108" y1="145" x2="175" y2="198" stroke="#90a4ae" stroke-width="2"/>
  <line x1="236" y1="145" x2="195" y2="198" stroke="#90a4ae" stroke-width="2"/>
  <line x1="236" y1="145" x2="225" y2="198" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="236" y1="145" x2="165" y2="198" stroke="#90a4ae" stroke-width="2"/>
  <!-- River under bridge -->
  <rect x="60" y="213" width="220" height="22" fill="#0d47a1" opacity="0.7"/>
  <line x1="60" y1="218" x2="280" y2="218" stroke="#42a5f5" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- AIRPORT / AERODROME (right side) -->
  <!-- Runway -->
  <rect x="400" y="200" width="200" height="30" fill="#424242"/>
  <line x1="500" y1="215" x2="600" y2="215" stroke="white" stroke-width="3" stroke-dasharray="14,8"/>
  <line x1="405" y1="200" x2="405" y2="230" stroke="#ffcc02" stroke-width="2"/>
  <line x1="595" y1="200" x2="595" y2="230" stroke="#ffcc02" stroke-width="2"/>
  <!-- Airplane silhouette -->
  <ellipse cx="480" cy="145" rx="45" ry="10" fill="#546e7a"/>
  <polygon points="435,140 445,155 445,135" fill="#37474f"/>
  <polygon points="468,135 478,118 490,130" fill="#546e7a"/>
  <polygon points="490,135 500,118 512,130" fill="#37474f" opacity="0.7"/>
  <polygon points="523,140 536,148 536,132" fill="#546e7a"/>
  <!-- Airport control tower -->
  <rect x="595" y="162" width="18" height="40" fill="#546e7a"/>
  <rect x="590" y="158" width="28" height="12" fill="#607d8b" rx="2"/>
  <rect x="592" y="150" width="24" height="10" fill="#455a64" rx="2"/>
  <!-- Lake boats (voies lacustres) -->
  <ellipse cx="340" cy="170" rx="32" ry="8" fill="#37474f"/>
  <rect x="320" y="162" width="42" height="9" fill="#455a64" rx="2"/>
  <rect x="336" y="150" width="12" height="14" fill="#546e7a" rx="1"/>
  <line x1="342" y1="150" x2="342" y2="135" stroke="#37474f" stroke-width="2"/>
  <polygon points="342,135 354,142 342,142" fill="#ef9a9a" opacity="0.8"/>
  <!-- Construction crane -->
  <rect x="55" y="85" width="8" height="100" fill="#f57f17"/>
  <line x1="59" y1="88" x2="130" y2="88" stroke="#f57f17" stroke-width="5"/>
  <line x1="59" y1="88" x2="30" y2="130" stroke="#f57f17" stroke-width="4"/>
  <line x1="130" y1="88" x2="120" y2="140" stroke="#e65100" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="116" y="140" width="10" height="12" fill="#5d4037"/>
  <!-- Sun -->
  <circle cx="560" cy="65" r="28" fill="#CE93D8" opacity="0.85"/>
  <circle cx="560" cy="65" r="20" fill="#BA68C8"/>
  <!-- Label bar -->
  <rect x="0" y="285" width="640" height="35" fill="#4a0072" fill-opacity="0.85"/>
  <text x="320" y="308" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Routes, Ponts, Aérodromes &amp; Voies Lacustres</text>
</svg>
