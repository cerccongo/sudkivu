<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003882"/>
      <stop offset="100%" stop-color="#1a3a6e"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="640" height="320" fill="url(#bg)"/>
  <!-- Abstract grid pattern -->
  <line x1="0" y1="80" x2="640" y2="80" stroke="#1a4a8a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="0" y1="160" x2="640" y2="160" stroke="#1a4a8a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="0" y1="240" x2="640" y2="240" stroke="#1a4a8a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="160" y1="0" x2="160" y2="320" stroke="#1a4a8a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="320" y1="0" x2="320" y2="320" stroke="#1a4a8a" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="480" y1="0" x2="480" y2="320" stroke="#1a4a8a" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Government building (colonial style) -->
  <!-- Main building -->
  <rect x="180" y="130" width="280" height="150" fill="url(#building)" rx="4"/>
  <!-- Facade columns -->
  <rect x="200" y="145" width="14" height="130" fill="#1976d2" rx="2"/>
  <rect x="228" y="145" width="14" height="130" fill="#1565c0" rx="2"/>
  <rect x="256" y="145" width="14" height="130" fill="#1976d2" rx="2"/>
  <rect x="336" y="145" width="14" height="130" fill="#1976d2" rx="2"/>
  <rect x="364" y="145" width="14" height="130" fill="#1565c0" rx="2"/>
  <rect x="392" y="145" width="14" height="130" fill="#1976d2" rx="2"/>
  <!-- Pediment/triangle roof -->
  <polygon points="175,130 320,55 465,130" fill="#0d47a1"/>
  <polygon points="185,130 320,65 455,130" fill="#1565c0"/>
  <!-- Dome on top -->
  <ellipse cx="320" cy="65" rx="35" ry="20" fill="#1565c0"/>
  <ellipse cx="320" cy="52" rx="22" ry="14" fill="#1976d2"/>
  <rect x="315" y="38" width="10" height="16" fill="#42a5f5"/>
  <polygon points="320,25 325,38 315,38" fill="#ffcc02"/>
  <!-- Windows -->
  <rect x="192" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <rect x="216" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <rect x="260" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <rect x="284" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <rect x="308" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <rect x="340" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <rect x="364" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <rect x="388" y="170" width="16" height="20" fill="#42a5f5" rx="1" opacity="0.8"/>
  <!-- Main door -->
  <rect x="296" y="234" width="48" height="46" fill="#0d47a1" rx="3"/>
  <rect x="300" y="236" width="19" height="42" fill="#1565c0" rx="2"/>
  <rect x="321" y="236" width="19" height="42" fill="#0d47a1" rx="2"/>
  <!-- Scale of justice (transparency symbol) -->
  <line x1="80" y1="80" x2="80" y2="250" stroke="#42a5f5" stroke-width="3"/>
  <line x1="45" y1="110" x2="115" y2="110" stroke="#42a5f5" stroke-width="2.5"/>
  <line x1="45" y1="110" x2="45" y2="145" stroke="#42a5f5" stroke-width="1.5"/>
  <line x1="115" y1="110" x2="115" y2="135" stroke="#42a5f5" stroke-width="1.5"/>
  <ellipse cx="45" cy="148" rx="18" ry="8" fill="#42a5f5" opacity="0.7"/>
  <ellipse cx="115" cy="138" rx="18" ry="8" fill="#42a5f5" opacity="0.7"/>
  <polygon points="75,75 80,60 85,75" fill="#ffcc02"/>
  <!-- Digital/network icon (numérisation) -->
  <rect x="530" y="80" width="60" height="45" fill="none" stroke="#42a5f5" stroke-width="2" rx="4"/>
  <line x1="530" y1="100" x2="590" y2="100" stroke="#42a5f5" stroke-width="1.5"/>
  <circle cx="545" cy="90" r="4" fill="#42a5f5"/>
  <circle cx="560" cy="90" r="4" fill="#42a5f5"/>
  <circle cx="575" cy="90" r="4" fill="#42a5f5"/>
  <circle cx="545" cy="110" r="3" fill="#ffcc02"/>
  <circle cx="560" cy="110" r="3" fill="#ffcc02"/>
  <circle cx="575" cy="110" r="3" fill="#ffcc02"/>
  <line x1="560" y1="125" x2="560" y2="140" stroke="#42a5f5" stroke-width="2"/>
  <line x1="540" y1="140" x2="580" y2="140" stroke="#42a5f5" stroke-width="2"/>
  <!-- Stars (sky) -->
  <circle cx="50" cy="40" r="2" fill="white" opacity="0.6"/>
  <circle cx="140" cy="25" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="400" cy="30" r="2" fill="white" opacity="0.6"/>
  <circle cx="490" cy="22" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="600" cy="45" r="2" fill="white" opacity="0.6"/>
  <!-- Label bar -->
  <rect x="0" y="285" width="640" height="35" fill="#001a4a" fill-opacity="0.8"/>
  <text x="320" y="308" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Gouvernance &amp; Leadership</text>
</svg>
