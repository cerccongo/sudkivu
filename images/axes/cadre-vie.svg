<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffecb3"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
  </defs>
  <!-- Sky at golden hour -->
  <rect width="640" height="320" fill="url(#sky)"/>
  <!-- Hills background -->
  <polygon points="0,215 80,150 180,190 280,130 400,180 520,120 640,165 640,255 0,255" fill="#388e3c" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="250" width="640" height="70" fill="#8bc34a" opacity="0.65"/>
  <!-- HOUSES (habitat & urbanisme) -->
  <!-- House 1 -->
  <rect x="50" y="185" width="80" height="65" fill="#ffe082" rx="3"/>
  <polygon points="45,188 90,145 135,188" fill="#ffa000"/>
  <rect x="75" y="212" width="25" height="38" fill="#795548" rx="2"/>
  <rect x="55" y="195" width="20" height="18" fill="#b3e5fc" rx="2"/>
  <rect x="104" y="195" width="20" height="18" fill="#b3e5fc" rx="2"/>
  <!-- House 2 -->
  <rect x="155" y="180" width="90" height="70" fill="#fff9c4" rx="3"/>
  <polygon points="150,183 200,138 250,183" fill="#f9a825"/>
  <rect x="182" y="210" width="26" height="40" fill="#6d4c41" rx="2"/>
  <rect x="158" y="190" width="22" height="20" fill="#b3e5fc" rx="2"/>
  <rect x="213" y="190" width="22" height="20" fill="#b3e5fc" rx="2"/>
  <!-- WATER TOWER -->
  <rect x="280" y="178" width="16" height="75" fill="#546e7a"/>
  <ellipse cx="288" cy="175" rx="28" ry="18" fill="#0277bd"/>
  <ellipse cx="288" cy="170" rx="28" ry="6" fill="#0288d1"/>
  <!-- Pipe from tower -->
  <rect x="295" y="185" width="6" height="30" fill="#37474f"/>
  <rect x="301" y="210" width="30" height="6" fill="#37474f"/>
  <!-- Water flowing -->
  <path d="M 331 213 Q 345 220 355 210" stroke="#0288d1" stroke-width="4" fill="none"/>
  <ellipse cx="358" cy="215" rx="8" ry="5" fill="#0288d1" opacity="0.8"/>
  <!-- ELECTRICITY POLE -->
  <rect x="395" y="165" width="8" height="90" fill="#424242"/>
  <line x1="375" y1="180" x2="415" y2="180" stroke="#424242" stroke-width="3"/>
  <line x1="380" y1="185" x2="380" y2="175" stroke="#424242" stroke-width="2"/>
  <line x1="410" y1="185" x2="410" y2="175" stroke="#424242" stroke-width="2"/>
  <!-- Power lines -->
  <line x1="380" y1="175" x2="0" y2="185" stroke="#616161" stroke-width="1.5" stroke-dasharray="8,4"/>
  <line x1="410" y1="175" x2="640" y2="190" stroke="#616161" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Lightbulb above pole -->
  <circle cx="399" cy="155" r="10" fill="#FFF176" opacity="0.9"/>
  <circle cx="399" cy="155" r="7" fill="#FFEE58"/>
  <rect x="396" y="165" width="6" height="4" fill="#ffa000"/>
  <!-- TREES (environment) -->
  <polygon points="460,255 475,215 490,255" fill="#2e7d32"/>
  <polygon points="468,245 483,202 498,245" fill="#388e3c"/>
  <polygon points="494,255 510,208 526,255" fill="#1b5e20"/>
  <polygon points="510,248 526,203 542,248" fill="#2e7d32"/>
  <!-- Leaf accent -->
  <ellipse cx="538" cy="240" rx="16" ry="10" fill="#43a047" transform="rotate(-20,538,240)"/>
  <ellipse cx="552" cy="232" rx="14" ry="9" fill="#66bb6a" transform="rotate(15,552,232)"/>
  <!-- Sport field / stadium arc -->
  <ellipse cx="575" cy="225" rx="50" ry="28" fill="none" stroke="#f57f17" stroke-width="3"/>
  <ellipse cx="575" cy="225" rx="38" ry="20" fill="#8bc34a" opacity="0.4"/>
  <line x1="575" y1="197" x2="575" y2="253" stroke="white" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- Cultural event symbol (music notes) -->
  <text x="52" y="168" font-family="Arial,sans-serif" font-size="22" fill="#CE8A00" opacity="0.8">♪</text>
  <text x="78" y="155" font-family="Arial,sans-serif" font-size="18" fill="#CE8A00" opacity="0.7">♫</text>
  <!-- Sanitation (clean drop) -->
  <path d="M 235 155 Q 235 130 245 120 Q 255 130 255 155 Q 255 165 245 168 Q 235 165 235 155 Z" fill="#0288d1" opacity="0.8"/>
  <!-- Sun golden glow -->
  <circle cx="80" cy="65" r="38" fill="#FF8F00" opacity="0.2"/>
  <circle cx="80" cy="65" r="28" fill="#FFC107" opacity="0.85"/>
  <circle cx="80" cy="65" r="20" fill="#FFD54F"/>
  <!-- Clouds -->
  <ellipse cx="400" cy="48" rx="60" ry="20" fill="white" opacity="0.65"/>
  <ellipse cx="375" cy="46" rx="42" ry="15" fill="white" opacity="0.55"/>
  <ellipse cx="550" cy="58" rx="50" ry="18" fill="white" opacity="0.6"/>
  <!-- Label bar -->
  <rect x="0" y="285" width="640" height="35" fill="#a06500" fill-opacity="0.88"/>
  <text x="320" y="308" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Eau, Énergie, Habitat &amp; Environnement</text>
</svg>
