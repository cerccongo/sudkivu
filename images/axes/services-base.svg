<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="school" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef9a9a"/>
      <stop offset="100%" stop-color="#e57373"/>
    </linearGradient>
    <linearGradient id="hospital" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#eeeeee"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="320" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="255" width="640" height="65" fill="#a5d6a7"/>
  <!-- Hills background -->
  <polygon points="0,220 100,160 200,200 320,150 440,195 560,150 640,180 640,260 0,260" fill="#66bb6a" opacity="0.5"/>
  <!-- SCHOOL BUILDING (left) -->
  <rect x="60" y="155" width="200" height="100" fill="url(#school)" rx="4"/>
  <!-- School roof -->
  <polygon points="55,158 165,100 275,158" fill="#c62828"/>
  <!-- School flag -->
  <line x1="165" y1="100" x2="165" y2="72" stroke="#424242" stroke-width="3"/>
  <rect x="165" y="72" width="28" height="18" fill="#1565c0" opacity="0.9"/>
  <!-- School windows -->
  <rect x="72" y="170" width="22" height="25" fill="#bbdefb" rx="2"/>
  <rect x="100" y="170" width="22" height="25" fill="#bbdefb" rx="2"/>
  <rect x="155" y="170" width="22" height="25" fill="#bbdefb" rx="2"/>
  <rect x="183" y="170" width="22" height="25" fill="#bbdefb" rx="2"/>
  <rect x="218" y="170" width="22" height="25" fill="#bbdefb" rx="2"/>
  <!-- School door -->
  <rect x="140" y="210" width="30" height="45" fill="#b71c1c" rx="2"/>
  <!-- School sign -->
  <rect x="90" y="162" width="80" height="8" fill="#ffcc02" rx="2"/>
  <!-- Students silhouettes -->
  <ellipse cx="100" cy="262" rx="6" ry="10" fill="#5d4037"/>
  <ellipse cx="100" cy="253" rx="4.5" ry="4.5" fill="#5d4037"/>
  <ellipse cx="116" cy="264" rx="6" ry="9" fill="#6d4c41"/>
  <ellipse cx="116" cy="255" rx="4" ry="4" fill="#6d4c41"/>
  <ellipse cx="130" cy="261" rx="5.5" ry="9" fill="#5d4037"/>
  <ellipse cx="130" cy="252" rx="4" ry="4" fill="#5d4037"/>
  <!-- HOSPITAL BUILDING (right) -->
  <rect x="380" y="145" width="220" height="110" fill="url(#hospital)" rx="4"/>
  <!-- Hospital roof -->
  <rect x="375" y="140" width="230" height="12" fill="#e0e0e0" rx="3"/>
  <!-- Red cross on hospital -->
  <rect x="475" y="110" width="40" height="14" fill="#e53935" rx="2"/>
  <rect x="489" y="96" width="12" height="42" fill="#e53935" rx="2"/>
  <!-- Hospital windows -->
  <rect x="388" y="162" width="28" height="32" fill="#b3e5fc" rx="2"/>
  <rect x="424" y="162" width="28" height="32" fill="#b3e5fc" rx="2"/>
  <rect x="460" y="162" width="28" height="32" fill="#b3e5fc" rx="2"/>
  <rect x="530" y="162" width="28" height="32" fill="#b3e5fc" rx="2"/>
  <rect x="566" y="162" width="28" height="32" fill="#b3e5fc" rx="2"/>
  <!-- Hospital door -->
  <rect x="480" y="210" width="30" height="45" fill="#bdbdbd" rx="2"/>
  <rect x="485" y="214" width="10" height="38" fill="#e0e0e0" rx="1"/>
  <rect x="497" y="214" width="10" height="38" fill="#9e9e9e" rx="1"/>
  <!-- Medical staff silhouette -->
  <ellipse cx="440" cy="264" rx="7" ry="11" fill="#f5f5f5"/>
  <ellipse cx="440" cy="253" rx="5" ry="5" fill="#f5f5f5"/>
  <ellipse cx="460" cy="266" rx="6" ry="10" fill="#e0e0e0"/>
  <ellipse cx="460" cy="256" rx="4.5" ry="4.5" fill="#e0e0e0"/>
  <!-- Path between school and hospital -->
  <path d="M 260 255 Q 320 240 380 255" stroke="#bdbdbd" stroke-width="8" fill="none" stroke-dasharray="12,6"/>
  <!-- Road/path symbol -->
  <line x1="260" y1="260" x2="380" y2="260" stroke="#e0e0e0" stroke-width="3"/>
  <!-- Health cross floating icon -->
  <rect x="302" y="178" width="36" height="10" fill="#e53935" rx="2" opacity="0.85"/>
  <rect x="313" y="167" width="14" height="32" fill="#e53935" rx="2" opacity="0.85"/>
  <!-- Book / education icon -->
  <rect x="278" y="198" width="35" height="28" fill="#1565c0" rx="3"/>
  <rect x="281" y="201" width="29" height="22" fill="#bbdefb" rx="2"/>
  <line x1="295" y1="201" x2="295" y2="223" stroke="#1565c0" stroke-width="1.5"/>
  <!-- Sun with care warmth -->
  <circle cx="80" cy="65" r="28" fill="#FF8A65" opacity="0.85"/>
  <circle cx="80" cy="65" r="20" fill="#FF7043"/>
  <!-- Clouds -->
  <ellipse cx="450" cy="55" rx="60" ry="20" fill="white" opacity="0.7"/>
  <ellipse cx="430" cy="53" rx="40" ry="15" fill="white" opacity="0.6"/>
  <ellipse cx="250" cy="70" rx="50" ry="18" fill="white" opacity="0.65"/>
  <!-- Label bar -->
  <rect x="0" y="285" width="640" height="35" fill="#7f0000" fill-opacity="0.85"/>
  <text x="320" y="308" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Éducation, Santé &amp; Services Sociaux</text>
</svg>
