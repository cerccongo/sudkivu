<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" width="640" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a3d1a"/>
      <stop offset="100%" stop-color="#1a7a2e"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#a5d6a7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#33691e"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="640" height="320" fill="url(#sky)"/>
  <!-- Ground -->
  <rect x="0" y="235" width="640" height="85" fill="url(#ground)"/>
  <!-- Farm fields (agriculture) -->
  <rect x="0" y="210" width="160" height="30" fill="#8bc34a" opacity="0.7"/>
  <rect x="0" y="180" width="150" height="28" fill="#aed581" opacity="0.65"/>
  <!-- Field rows -->
  <line x1="10" y1="216" x2="155" y2="216" stroke="#558b2f" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="10" y1="222" x2="155" y2="222" stroke="#558b2f" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="10" y1="186" x2="148" y2="186" stroke="#558b2f" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="10" y1="192" x2="148" y2="192" stroke="#558b2f" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Mountain background -->
  <polygon points="0,200 80,130 160,180 260,110 360,155 460,105 560,150 640,120 640,240 0,240" fill="#2e7d32" opacity="0.55"/>
  <!-- Mining shaft / mine structure -->
  <rect x="450" y="145" width="12" height="90" fill="#424242"/>
  <rect x="480" y="148" width="12" height="87" fill="#424242"/>
  <line x1="450" y1="145" x2="492" y2="145" stroke="#424242" stroke-width="5"/>
  <polygon points="465,128 492,148 438,148" fill="#616161"/>
  <rect x="438" y="178" width="68" height="38" fill="#546e7a" rx="3"/>
  <rect x="454" y="168" width="20" height="12" fill="#607d8b" rx="2"/>
  <!-- Market/commerce building -->
  <rect x="260" y="175" width="150" height="65" fill="#f57f17" rx="4"/>
  <rect x="265" y="165" width="140" height="12" fill="#e65100" rx="2"/>
  <!-- Market sign -->
  <rect x="295" y="168" width="50" height="8" fill="#ffcc02" rx="2"/>
  <!-- Market stalls inside -->
  <rect x="270" y="180" width="25" height="20" fill="#fff9c4" rx="1"/>
  <rect x="298" y="180" width="25" height="20" fill="#fff9c4" rx="1"/>
  <rect x="326" y="180" width="25" height="20" fill="#fff9c4" rx="1"/>
  <rect x="354" y="180" width="25" height="20" fill="#fff9c4" rx="1"/>
  <!-- Market doors -->
  <rect x="300" y="210" width="15" height="30" fill="#e65100" rx="1"/>
  <rect x="318" y="210" width="15" height="30" fill="#bf360c" rx="1"/>
  <!-- Growth chart / bar chart (économie) -->
  <rect x="60" y="240" width="180" height="4" fill="#1b5e20"/>
  <rect x="60" y="130" width="4" height="114" fill="#1b5e20"/>
  <rect x="72" y="210" width="20" height="30" fill="#4caf50" opacity="0.9"/>
  <rect x="96" y="195" width="20" height="45" fill="#43a047" opacity="0.9"/>
  <rect x="120" y="180" width="20" height="60" fill="#388e3c" opacity="0.9"/>
  <rect x="144" y="160" width="20" height="80" fill="#2e7d32" opacity="0.9"/>
  <rect x="168" y="145" width="20" height="95" fill="#1b5e20"/>
  <rect x="192" y="133" width="20" height="107" fill="#33691e"/>
  <!-- Upward arrow on chart -->
  <line x1="192" y1="133" x2="215" y2="110" stroke="#ffcc02" stroke-width="3"/>
  <polygon points="215,110 208,122 222,122" fill="#ffcc02"/>
  <!-- Agricultural crops (bananas/cassava) -->
  <line x1="55" y1="235" x2="55" y2="200" stroke="#5d4037" stroke-width="4"/>
  <ellipse cx="55" cy="195" rx="22" ry="12" fill="#558b2f" transform="rotate(-15,55,195)"/>
  <ellipse cx="55" cy="197" rx="18" ry="9" fill="#689f38" transform="rotate(20,55,197)"/>
  <line x1="30" y1="235" x2="30" y2="205" stroke="#5d4037" stroke-width="3"/>
  <ellipse cx="30" cy="199" rx="18" ry="10" fill="#2e7d32" transform="rotate(10,30,199)"/>
  <!-- Coltan/mineral nuggets -->
  <polygon points="530,195 540,183 550,195 545,207 535,207" fill="#546e7a" opacity="0.9"/>
  <polygon points="548,198 558,188 568,198 563,208 553,208" fill="#78909c" opacity="0.8"/>
  <polygon points="565,192 575,182 585,192 580,202 570,202" fill="#607d8b" opacity="0.9"/>
  <!-- Tourist site hint (lake view) -->
  <ellipse cx="590" cy="160" rx="40" ry="20" fill="#1565c0" opacity="0.6"/>
  <line x1="550" y1="160" x2="630" y2="160" stroke="#42a5f5" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="550" y1="168" x2="630" y2="168" stroke="#42a5f5" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Sun -->
  <circle cx="580" cy="60" r="30" fill="#FFC107" opacity="0.85"/>
  <circle cx="580" cy="60" r="22" fill="#FFD54F"/>
  <!-- Label bar -->
  <rect x="0" y="285" width="640" height="35" fill="#1a5e2a" fill-opacity="0.88"/>
  <text x="320" y="308" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Économie, Agriculture &amp; Emploi</text>
</svg>
