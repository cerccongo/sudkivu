<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3f2fd"/>
      <stop offset="100%" stop-color="#bbdefb"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Lake Kivu -->
  <rect x="0" y="240" width="640" height="120" fill="url(#lake)"/>
  <!-- Distant hills across lake -->
  <polygon points="0,190 80,140 160,170 260,125 360,155 450,120 560,150 640,130 640,245 0,245" fill="#388e3c" opacity="0.6"/>
  <!-- Kahuzi-Biega park mountains -->
  <polygon points="0,360 50,230 100,280 160,200 240,250 300,190 360,240 430,185 510,230 580,170 640,210 640,360" fill="#2e7d32" opacity="0.9"/>
  <!-- Dense tropical forest overlay -->
  <polygon points="0,360 40,255 90,295 150,240 220,270 300,220 380,260 460,215 540,250 600,200 640,230 640,360" fill="#1b5e20" opacity="0.7"/>
  <!-- Gorilla silhouette (Kahuzi-Biega is known for gorillas) -->
  <ellipse cx="350" cy="275" rx="30" ry="25" fill="#212121" opacity="0.85"/>
  <ellipse cx="350" cy="252" rx="20" ry="18" fill="#212121" opacity="0.85"/>
  <!-- Gorilla head features -->
  <ellipse cx="345" cy="250" rx="8" ry="6" fill="#37474f" opacity="0.8"/>
  <ellipse cx="355" cy="250" rx="8" ry="6" fill="#37474f" opacity="0.8"/>
  <!-- Gorilla arms -->
  <path d="M 322 268 Q 310 280 305 295" stroke="#212121" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 378 268 Q 390 280 395 295" stroke="#212121" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Forest detail trees -->
  <polygon points="80,360 100,310 120,360" fill="#1b5e20"/>
  <polygon points="100,360 122,302 144,360" fill="#2e7d32"/>
  <polygon points="150,360 172,305 194,360" fill="#1b5e20"/>
  <polygon points="460,360 482,308 504,360" fill="#1b5e20"/>
  <polygon points="500,360 522,312 544,360" fill="#2e7d32"/>
  <!-- Lake shimmer -->
  <line x1="0" y1="250" x2="640" y2="250" stroke="white" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="0" y1="265" x2="640" y2="265" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <line x1="0" y1="285" x2="640" y2="285" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
  <!-- Fisherman canoe on lake -->
  <ellipse cx="550" cy="255" rx="40" ry="8" fill="#5d4037"/>
  <line x1="550" y1="247" x2="550" y2="232" stroke="#3e2723" stroke-width="2"/>
  <line x1="540" y1="240" x2="565" y2="248" stroke="#3e2723" stroke-width="1.5"/>
  <!-- Sun -->
  <circle cx="90" cy="75" r="30" fill="#FFF9C4" opacity="0.95"/>
  <circle cx="90" cy="75" r="22" fill="#FFF176"/>
  <!-- Clouds -->
  <ellipse cx="280" cy="50" rx="60" ry="20" fill="white" opacity="0.65"/>
  <ellipse cx="255" cy="48" rx="40" ry="15" fill="white" opacity="0.55"/>
  <ellipse cx="500" cy="60" rx="50" ry="18" fill="white" opacity="0.6"/>
  <!-- Label -->
  <rect x="20" y="310" width="110" height="36" rx="6" fill="#0d47a1" fill-opacity="0.88"/>
  <text x="75" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Kalehe</text>
</svg>
