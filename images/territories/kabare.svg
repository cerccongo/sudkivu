<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2f1"/>
      <stop offset="100%" stop-color="#b2dfdb"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Mist/clouds in valleys -->
  <ellipse cx="200" cy="220" rx="150" ry="30" fill="white" opacity="0.35"/>
  <ellipse cx="450" cy="230" rx="130" ry="25" fill="white" opacity="0.3"/>
  <ellipse cx="320" cy="215" rx="180" ry="28" fill="white" opacity="0.25"/>
  <!-- Large forested mountain range -->
  <polygon points="0,360 60,200 140,270 200,160 300,230 380,150 460,210 550,130 640,190 640,360" fill="url(#mountain)"/>
  <!-- Lighter green upper slopes -->
  <polygon points="60,200 130,240 200,160 270,210 380,150 440,195 550,130 600,165 640,190 640,250 440,250 380,220 200,230 130,270 60,270" fill="#388e3c" opacity="0.6"/>
  <!-- Forested peaks detail -->
  <!-- Mountain 1 trees -->
  <polygon points="150,270 165,245 180,270" fill="#1b5e20"/>
  <polygon points="170,270 185,242 200,270" fill="#2e7d32"/>
  <polygon points="190,270 205,248 220,270" fill="#1b5e20"/>
  <!-- Mountain 2 trees -->
  <polygon points="310,230 325,205 340,230" fill="#1b5e20"/>
  <polygon points="330,230 345,202 360,230" fill="#2e7d32"/>
  <!-- Coffee plants in foreground -->
  <ellipse cx="80" cy="330" rx="25" ry="18" fill="#2e7d32"/>
  <ellipse cx="110" cy="335" rx="22" ry="16" fill="#388e3c"/>
  <ellipse cx="140" cy="328" rx="24" ry="17" fill="#1b5e20"/>
  <ellipse cx="170" cy="332" rx="20" ry="15" fill="#2e7d32"/>
  <ellipse cx="200" cy="327" rx="25" ry="18" fill="#388e3c"/>
  <!-- Red coffee berries -->
  <circle cx="88" cy="324" r="3" fill="#e53935"/>
  <circle cx="95" cy="330" r="3" fill="#c62828"/>
  <circle cx="115" cy="329" r="3" fill="#e53935"/>
  <circle cx="148" cy="322" r="3" fill="#c62828"/>
  <circle cx="185" cy="325" r="3" fill="#e53935"/>
  <!-- Cattle/cows on hillside -->
  <ellipse cx="400" cy="295" rx="18" ry="10" fill="#f5f5f5"/>
  <rect x="393" y="295" width="14" height="8" fill="#f5f5f5" rx="2"/>
  <circle cx="405" cy="293" r="5" fill="#f5f5f5"/>
  <line x1="394" y1="303" x2="392" y2="315" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="400" y1="303" x2="398" y2="315" stroke="#9e9e9e" stroke-width="2"/>
  <line x1="406" y1="303" x2="408" y2="315" stroke="#9e9e9e" stroke-width="2"/>
  <ellipse cx="450" cy="300" rx="16" ry="9" fill="#f5f5f5"/>
  <!-- River/stream in valley -->
  <path d="M 250 360 Q 280 310 310 330 Q 340 348 370 320 Q 400 295 420 310" stroke="#1565c0" stroke-width="4" fill="none" stroke-opacity="0.7"/>
  <!-- Sun with clouds -->
  <circle cx="560" cy="65" r="28" fill="#FFF176" opacity="0.9"/>
  <ellipse cx="470" cy="55" rx="50" ry="18" fill="white" opacity="0.7"/>
  <ellipse cx="445" cy="53" rx="32" ry="14" fill="white" opacity="0.6"/>
  <ellipse cx="510" cy="52" rx="38" ry="15" fill="white" opacity="0.65"/>
  <!-- Label -->
  <rect x="20" y="310" width="110" height="36" rx="6" fill="#1b5e20" fill-opacity="0.88"/>
  <text x="75" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Kabare</text>
</svg>
