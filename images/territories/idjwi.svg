<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#a5d6a7"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="island" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Lake Kivu water -->
  <rect x="0" y="0" width="640" height="360" fill="url(#lake)" opacity="0.85"/>
  <!-- Distant mainland hills (background) -->
  <polygon points="0,200 100,140 200,170 300,130 400,160 520,110 640,145 640,240 0,240" fill="#2e7d32" opacity="0.8"/>
  <!-- Island main mass -->
  <ellipse cx="320" cy="240" rx="220" ry="80" fill="url(#island)"/>
  <!-- Island hills/volcano -->
  <polygon points="200,240 260,150 320,240" fill="#1b5e20"/>
  <polygon points="280,240 340,155 400,240" fill="#2e7d32"/>
  <polygon points="350,240 400,175 450,240" fill="#1b5e20" opacity="0.8"/>
  <!-- Banana/plantain trees on island -->
  <line x1="240" y1="240" x2="240" y2="210" stroke="#5d4037" stroke-width="4"/>
  <ellipse cx="240" cy="205" rx="20" ry="12" fill="#558b2f" transform="rotate(-15,240,205)"/>
  <ellipse cx="240" cy="207" rx="16" ry="9" fill="#689f38" transform="rotate(20,240,207)"/>
  <line x1="380" y1="240" x2="380" y2="212" stroke="#5d4037" stroke-width="4"/>
  <ellipse cx="380" cy="206" rx="22" ry="12" fill="#33691e" transform="rotate(10,380,206)"/>
  <ellipse cx="380" cy="208" rx="18" ry="10" fill="#558b2f" transform="rotate(-20,380,208)"/>
  <line x1="310" y1="240" x2="310" y2="208" stroke="#5d4037" stroke-width="3"/>
  <ellipse cx="310" cy="202" rx="18" ry="10" fill="#558b2f" transform="rotate(-10,310,202)"/>
  <!-- Village on island -->
  <rect x="300" y="224" width="14" height="16" fill="#795548" rx="1"/>
  <polygon points="300,224 314,224 307,216" fill="#a1887f"/>
  <rect x="318" y="226" width="12" height="14" fill="#6d4c41" rx="1"/>
  <polygon points="318,226 330,226 324,219" fill="#8d6e63"/>
  <!-- Small boats around island -->
  <ellipse cx="90" cy="200" rx="28" ry="6" fill="#5d4037"/>
  <rect x="76" y="194" width="28" height="6" fill="#6d4c41" rx="2"/>
  <line x1="90" y1="194" x2="90" y2="182" stroke="#3e2723" stroke-width="2"/>
  <polygon points="90,182 104,189 90,189" fill="#ef9a9a" opacity="0.8"/>
  <ellipse cx="550" cy="205" rx="25" ry="5" fill="#5d4037"/>
  <!-- Water ripples around island -->
  <ellipse cx="320" cy="240" rx="240" ry="88" fill="none" stroke="#81d4fa" stroke-width="2" stroke-opacity="0.4"/>
  <ellipse cx="320" cy="240" rx="256" ry="94" fill="none" stroke="#81d4fa" stroke-width="1.5" stroke-opacity="0.3"/>
  <!-- Lake shimmer -->
  <line x1="0" y1="100" x2="640" y2="100" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
  <line x1="0" y1="130" x2="640" y2="130" stroke="white" stroke-width="1.5" stroke-opacity="0.12"/>
  <!-- Volcano/mountain mist -->
  <ellipse cx="275" cy="150" rx="30" ry="10" fill="white" opacity="0.25"/>
  <!-- Sun -->
  <circle cx="70" cy="70" r="32" fill="#FFF59D" opacity="0.9"/>
  <circle cx="70" cy="70" r="22" fill="#FFF176"/>
  <!-- Label -->
  <rect x="20" y="310" width="100" height="36" rx="6" fill="#1b5e20" fill-opacity="0.88"/>
  <text x="70" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Idjwi</text>
</svg>
