<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#f8bbd0"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
  </defs>
  <!-- Sky at dawn -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Background forested hills -->
  <polygon points="0,210 100,140 200,190 320,130 440,180 580,120 640,150 640,280 0,280" fill="#1b5e20" opacity="0.7"/>
  <polygon points="0,235 150,175 280,215 420,165 560,200 640,185 640,290 0,290" fill="#2e7d32" opacity="0.8"/>
  <!-- Ground -->
  <rect x="0" y="280" width="640" height="80" fill="url(#ground)"/>
  <!-- River/stream -->
  <path d="M 80 360 Q 160 290 240 310 Q 320 330 400 295 Q 480 260 560 280 L 640 270 L 640 360 Z" fill="#1565c0" opacity="0.7"/>
  <!-- Mining equipment silhouettes -->
  <!-- Headframe (mine shaft structure) -->
  <rect x="300" y="215" width="10" height="70" fill="#424242"/>
  <rect x="330" y="215" width="10" height="70" fill="#424242"/>
  <line x1="300" y1="215" x2="340" y2="215" stroke="#424242" stroke-width="4"/>
  <polygon points="315,195 340,215 290,215" fill="#616161"/>
  <!-- Ore processing building -->
  <rect x="280" y="245" width="75" height="40" fill="#546e7a" rx="3"/>
  <rect x="295" y="235" width="15" height="12" fill="#607d8b" rx="2"/>
  <!-- Mining truck silhouette -->
  <rect x="150" y="263" width="60" height="25" fill="#37474f" rx="3"/>
  <rect x="165" y="255" width="35" height="12" fill="#455a64" rx="2"/>
  <circle cx="165" cy="290" r="8" fill="#212121"/>
  <circle cx="197" cy="290" r="8" fill="#212121"/>
  <!-- Smoke from processing -->
  <ellipse cx="308" cy="225" rx="12" ry="8" fill="#9e9e9e" opacity="0.5"/>
  <ellipse cx="308" cy="214" rx="10" ry="7" fill="#bdbdbd" opacity="0.4"/>
  <ellipse cx="312" cy="205" rx="8" ry="6" fill="#e0e0e0" opacity="0.3"/>
  <!-- Town buildings -->
  <rect x="380" y="235" width="18" height="50" fill="#78909c" rx="2"/>
  <rect x="402" y="228" width="22" height="57" fill="#90a4ae" rx="2"/>
  <rect x="428" y="235" width="18" height="50" fill="#78909c" rx="2"/>
  <rect x="450" y="225" width="25" height="60" fill="#607d8b" rx="2"/>
  <rect x="479" y="240" width="20" height="45" fill="#90a4ae" rx="2"/>
  <!-- Windows -->
  <rect x="408" y="236" width="5" height="5" fill="#fff9c4" rx="1"/>
  <rect x="416" y="236" width="5" height="5" fill="#fff9c4" rx="1"/>
  <rect x="456" y="233" width="5" height="5" fill="#fff9c4" rx="1"/>
  <rect x="464" y="233" width="5" height="5" fill="#fff9c4" rx="1"/>
  <!-- Gold nugget icon -->
  <polygon points="60,200 75,185 90,200 82,215 68,215" fill="#FFD700" opacity="0.9"/>
  <polygon points="65,195 80,183 88,198 78,210 62,210" fill="#FFC107" opacity="0.7"/>
  <!-- Trees -->
  <polygon points="500,250 490,280 510,280" fill="#1b5e20"/>
  <polygon points="520,245 510,275 530,275" fill="#2e7d32"/>
  <polygon points="540,252 530,280 550,280" fill="#1b5e20"/>
  <!-- Sun rising -->
  <circle cx="80" cy="95" r="36" fill="#FF8F00" opacity="0.8"/>
  <circle cx="80" cy="95" r="26" fill="#FFC107"/>
  <!-- Label -->
  <rect x="20" y="310" width="140" height="36" rx="6" fill="#4e342e" fill-opacity="0.88"/>
  <text x="90" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Kamituga</text>
</svg>
