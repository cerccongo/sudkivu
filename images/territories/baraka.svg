<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffe082"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Distant mountains -->
  <polygon points="0,200 100,130 200,180 300,120 440,170 560,110 640,155 640,250 0,250" fill="#4caf50" opacity="0.5"/>
  <polygon points="0,225 120,165 250,205 380,155 500,195 640,165 640,265 0,265" fill="#388e3c" opacity="0.65"/>
  <!-- Lake Tanganyika -->
  <rect x="0" y="260" width="640" height="100" fill="url(#lake)"/>
  <!-- Port dock structure -->
  <rect x="180" y="252" width="200" height="10" fill="#4e342e"/>
  <rect x="185" y="242" width="6" height="20" fill="#3e2723"/>
  <rect x="280" y="238" width="6" height="24" fill="#3e2723"/>
  <rect x="375" y="242" width="6" height="20" fill="#3e2723"/>
  <!-- Large cargo boat -->
  <ellipse cx="460" cy="270" rx="80" ry="14" fill="#455a64"/>
  <rect x="400" y="256" width="120" height="14" fill="#546e7a" rx="4"/>
  <rect x="420" y="242" width="40" height="16" fill="#607d8b" rx="2"/>
  <rect x="465" y="238" width="8" height="24" fill="#37474f" stroke-width="1"/>
  <polygon points="465,236 480,244 465,244" fill="#ffcc02" opacity="0.9"/>
  <!-- Small fishing boats -->
  <ellipse cx="100" cy="275" rx="35" ry="7" fill="#795548"/>
  <rect x="85" y="268" width="30" height="7" fill="#8d6e63" rx="2"/>
  <line x1="100" y1="268" x2="100" y2="254" stroke="#5d4037" stroke-width="2"/>
  <polygon points="100,254 115,261 100,261" fill="#ef9a9a" opacity="0.8"/>
  <ellipse cx="155" cy="272" rx="28" ry="6" fill="#6d4c41"/>
  <!-- City buildings -->
  <rect x="250" y="195" width="20" height="57" fill="#f57f17" rx="2" opacity="0.9"/>
  <rect x="274" y="185" width="24" height="67" fill="#e65100" rx="2" opacity="0.85"/>
  <rect x="302" y="192" width="18" height="60" fill="#bf360c" rx="2"/>
  <rect x="324" y="182" width="26" height="70" fill="#e65100" rx="2" opacity="0.85"/>
  <rect x="354" y="195" width="20" height="57" fill="#f57f17" rx="2" opacity="0.9"/>
  <rect x="378" y="190" width="22" height="62" fill="#e65100" rx="2"/>
  <!-- Windows -->
  <rect x="280" y="193" width="5" height="5" fill="#fff8e1" rx="1"/>
  <rect x="288" y="193" width="5" height="5" fill="#fff8e1" rx="1"/>
  <rect x="330" y="190" width="5" height="5" fill="#fff8e1" rx="1"/>
  <rect x="338" y="190" width="5" height="5" fill="#fff8e1" rx="1"/>
  <!-- Market stalls on waterfront -->
  <rect x="200" y="245" width="30" height="15" fill="#a5d6a7" opacity="0.8"/>
  <rect x="232" y="245" width="30" height="15" fill="#ffcc02" opacity="0.8"/>
  <line x1="200" y1="245" x2="200" y2="238" stroke="#5d4037" stroke-width="2"/>
  <line x1="230" y1="245" x2="230" y2="238" stroke="#5d4037" stroke-width="2"/>
  <line x1="262" y1="245" x2="262" y2="238" stroke="#5d4037" stroke-width="2"/>
  <!-- Sun (sunset orange) -->
  <circle cx="580" cy="60" r="32" fill="#FF6F00" opacity="0.9"/>
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="60" ry="20" fill="white" opacity="0.6"/>
  <ellipse cx="120" cy="78" rx="40" ry="16" fill="white" opacity="0.5"/>
  <!-- Label -->
  <rect x="20" y="310" width="120" height="36" rx="6" fill="#bf360c" fill-opacity="0.85"/>
  <text x="80" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Baraka</text>
</svg>
