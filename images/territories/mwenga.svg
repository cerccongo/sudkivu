<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9fbe7"/>
      <stop offset="100%" stop-color="#dcedc8"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="50%" stop-color="#1976d2"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Dense forest background -->
  <rect x="0" y="80" width="640" height="280" fill="url(#forest)"/>
  <!-- Forest canopy layers -->
  <polygon points="0,80 40,40 80,80 120,35 160,80 200,30 240,80 280,38 320,80 360,32 400,80 440,40 480,80 520,35 560,80 600,38 640,80 640,110 0,110" fill="#1b5e20"/>
  <polygon points="0,100 50,65 100,100 150,60 200,100 250,62 300,100 350,58 400,100 450,65 500,100 550,60 600,100 640,65 640,120 0,120" fill="#2e7d32" opacity="0.8"/>
  <!-- Tree trunks -->
  <rect x="50" y="160" width="8" height="100" fill="#3e2723" opacity="0.7"/>
  <rect x="130" y="150" width="8" height="110" fill="#3e2723" opacity="0.7"/>
  <rect x="210" y="155" width="8" height="105" fill="#3e2723" opacity="0.7"/>
  <rect x="420" y="158" width="8" height="102" fill="#3e2723" opacity="0.7"/>
  <rect x="500" y="152" width="8" height="108" fill="#3e2723" opacity="0.7"/>
  <rect x="580" y="162" width="8" height="98" fill="#3e2723" opacity="0.7"/>
  <!-- Ulindi River winding through forest -->
  <path d="M 0 240 Q 80 220 160 250 Q 240 280 320 255 Q 400 230 480 260 Q 560 290 640 265" stroke="url(#river)" stroke-width="30" fill="none"/>
  <path d="M 0 240 Q 80 220 160 250 Q 240 280 320 255 Q 400 230 480 260 Q 560 290 640 265" stroke="#42a5f5" stroke-width="26" fill="none" opacity="0.6"/>
  <!-- River banks vegetation -->
  <ellipse cx="90" cy="240" rx="18" ry="10" fill="#33691e" opacity="0.8"/>
  <ellipse cx="200" cy="258" rx="15" ry="8" fill="#2e7d32" opacity="0.8"/>
  <ellipse cx="340" cy="248" rx="16" ry="9" fill="#33691e" opacity="0.8"/>
  <ellipse cx="450" cy="255" rx="14" ry="8" fill="#2e7d32" opacity="0.8"/>
  <!-- Gold deposit sparkle effect -->
  <polygon points="310,185 315,175 320,185 315,195" fill="#FFD700" opacity="0.7"/>
  <polygon points="325,178 330,168 335,178 330,188" fill="#FFC107" opacity="0.6"/>
  <polygon points="290,192 295,182 300,192 295,202" fill="#FFD700" opacity="0.5"/>
  <!-- Bird silhouettes in sky -->
  <path d="M 200 55 Q 208 48 216 55" stroke="#424242" stroke-width="2" fill="none"/>
  <path d="M 220 48 Q 228 41 236 48" stroke="#424242" stroke-width="2" fill="none"/>
  <path d="M 400 65 Q 408 58 416 65" stroke="#424242" stroke-width="2" fill="none"/>
  <!-- Sun with tropical haze -->
  <circle cx="560" cy="60" r="28" fill="#FFEB3B" opacity="0.88"/>
  <circle cx="560" cy="60" r="20" fill="#FFF176"/>
  <!-- Mist in canopy -->
  <rect x="0" y="115" width="640" height="20" fill="white" opacity="0.15"/>
  <!-- Label -->
  <rect x="20" y="310" width="120" height="36" rx="6" fill="#1b5e20" fill-opacity="0.88"/>
  <text x="80" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Mwenga</text>
</svg>
