<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e1f5fe"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0277bd"/>
      <stop offset="100%" stop-color="#01579b"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Distant hills (Burundi/Tanzania border) -->
  <polygon points="0,200 100,135 200,175 320,120 440,160 560,105 640,145 640,255 0,255" fill="#66bb6a" opacity="0.55"/>
  <polygon points="0,225 100,165 220,205 340,155 460,195 580,145 640,175 640,265 0,265" fill="#43a047" opacity="0.65"/>
  <!-- Lake Tanganyika (main feature) -->
  <rect x="0" y="258" width="640" height="102" fill="url(#lake)"/>
  <!-- Shoreline vegetation -->
  <ellipse cx="60" cy="258" rx="45" ry="15" fill="#388e3c" opacity="0.9"/>
  <ellipse cx="160" cy="260" rx="40" ry="13" fill="#2e7d32" opacity="0.85"/>
  <ellipse cx="480" cy="257" rx="50" ry="14" fill="#388e3c" opacity="0.9"/>
  <ellipse cx="580" cy="260" rx="40" ry="13" fill="#2e7d32" opacity="0.85"/>
  <!-- Cross-border trade market stalls -->
  <rect x="250" y="232" width="28" height="22" fill="#f5f5f5" rx="2"/>
  <rect x="282" y="232" width="28" height="22" fill="#ffe082" rx="2"/>
  <rect x="314" y="232" width="28" height="22" fill="#a5d6a7" rx="2"/>
  <rect x="346" y="232" width="28" height="22" fill="#f5f5f5" rx="2"/>
  <!-- Awning poles -->
  <line x1="250" y1="232" x2="250" y2="220" stroke="#5d4037" stroke-width="2"/>
  <line x1="278" y1="232" x2="278" y2="220" stroke="#5d4037" stroke-width="2"/>
  <line x1="282" y1="232" x2="282" y2="220" stroke="#5d4037" stroke-width="2"/>
  <line x1="310" y1="232" x2="310" y2="220" stroke="#5d4037" stroke-width="2"/>
  <line x1="374" y1="232" x2="374" y2="220" stroke="#5d4037" stroke-width="2"/>
  <!-- Fishing boats on lake -->
  <ellipse cx="120" cy="272" rx="40" ry="8" fill="#5d4037"/>
  <rect x="104" y="264" width="32" height="8" fill="#6d4c41" rx="2"/>
  <line x1="120" y1="264" x2="120" y2="250" stroke="#3e2723" stroke-width="2"/>
  <polygon points="120,250 136,257 120,257" fill="#f44336" opacity="0.8"/>
  <ellipse cx="520" cy="275" rx="35" ry="7" fill="#5d4037"/>
  <rect x="505" y="268" width="30" height="7" fill="#6d4c41" rx="2"/>
  <line x1="520" y1="268" x2="520" y2="255" stroke="#3e2723" stroke-width="2"/>
  <!-- Lake shimmer -->
  <line x1="0" y1="268" x2="640" y2="268" stroke="white" stroke-width="1.5" stroke-opacity="0.25"/>
  <line x1="0" y1="285" x2="640" y2="285" stroke="white" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Palm trees -->
  <line x1="430" y1="258" x2="430" y2="220" stroke="#5d4037" stroke-width="4"/>
  <ellipse cx="430" cy="214" rx="22" ry="12" fill="#388e3c" transform="rotate(-15,430,214)"/>
  <ellipse cx="430" cy="216" rx="18" ry="9" fill="#43a047" transform="rotate(20,430,216)"/>
  <line x1="200" y1="258" x2="200" y2="225" stroke="#5d4037" stroke-width="3"/>
  <ellipse cx="200" cy="219" rx="18" ry="10" fill="#388e3c" transform="rotate(10,200,219)"/>
  <!-- Border marker sign -->
  <rect x="560" y="215" width="50" height="30" fill="#1565c0" rx="3"/>
  <text x="585" y="236" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">FRONTIÈRE</text>
  <line x1="585" y1="245" x2="585" y2="258" stroke="#1565c0" stroke-width="3"/>
  <!-- Sun -->
  <circle cx="80" cy="70" r="28" fill="#FFF59D" opacity="0.9"/>
  <!-- Label -->
  <rect x="20" y="310" width="160" height="36" rx="6" fill="#01579b" fill-opacity="0.88"/>
  <text x="100" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Uvira (Territoire)</text>
</svg>
