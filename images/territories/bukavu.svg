<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#87c4f0"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="640" height="360" fill="url(#sky)"/>
  <!-- Distant hills -->
  <ellipse cx="120" cy="200" rx="180" ry="90" fill="#388e3c" opacity="0.7"/>
  <ellipse cx="520" cy="210" rx="200" ry="100" fill="#2e7d32" opacity="0.7"/>
  <ellipse cx="320" cy="190" rx="220" ry="80" fill="#43a047" opacity="0.6"/>
  <!-- Lake Kivu -->
  <rect x="0" y="255" width="640" height="105" fill="url(#lake)"/>
  <!-- Lake shimmer -->
  <line x1="0" y1="265" x2="640" y2="265" stroke="white" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="0" y1="280" x2="640" y2="280" stroke="white" stroke-width="0.8" stroke-opacity="0.15"/>
  <line x1="0" y1="298" x2="640" y2="298" stroke="white" stroke-width="1" stroke-opacity="0.1"/>
  <!-- City buildings on hillside -->
  <rect x="180" y="185" width="22" height="60" fill="#795548" rx="2"/>
  <rect x="205" y="170" width="28" height="75" fill="#8d6e63" rx="2"/>
  <rect x="236" y="180" width="20" height="65" fill="#6d4c41" rx="2"/>
  <rect x="259" y="162" width="30" height="83" fill="#5d4037" rx="2"/>
  <rect x="292" y="155" width="24" height="90" fill="#795548" rx="2"/>
  <rect x="319" y="168" width="26" height="77" fill="#8d6e63" rx="2"/>
  <rect x="348" y="178" width="20" height="67" fill="#6d4c41" rx="2"/>
  <rect x="371" y="165" width="28" height="80" fill="#5d4037" rx="2"/>
  <rect x="402" y="175" width="22" height="70" fill="#795548" rx="2"/>
  <rect x="427" y="185" width="18" height="60" fill="#8d6e63" rx="2"/>
  <!-- Building windows -->
  <rect x="213" y="178" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="221" y="178" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="213" y="190" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="265" y="170" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="273" y="170" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="300" y="163" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="308" y="163" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="327" y="175" width="5" height="5" fill="#ffcc02" rx="1"/>
  <rect x="378" y="172" width="5" height="5" fill="#ffcc02" rx="1"/>
  <!-- Church/Cathedral -->
  <rect x="300" y="130" width="18" height="30" fill="#eceff1"/>
  <polygon points="309,110 300,135 318,135" fill="#b0bec5"/>
  <!-- Hillside green -->
  <ellipse cx="160" cy="240" rx="60" ry="20" fill="#388e3c" opacity="0.8"/>
  <ellipse cx="480" cy="245" rx="50" ry="18" fill="#2e7d32" opacity="0.8"/>
  <!-- Water reflections -->
  <rect x="220" y="262" width="60" height="3" fill="white" opacity="0.15" rx="2"/>
  <rect x="340" y="270" width="80" height="2" fill="white" opacity="0.12" rx="2"/>
  <!-- Sun -->
  <circle cx="560" cy="65" r="28" fill="#FFD54F" opacity="0.9"/>
  <circle cx="560" cy="65" r="20" fill="#FFEB3B"/>
  <!-- Label -->
  <rect x="20" y="310" width="140" height="36" rx="6" fill="#003882" fill-opacity="0.85"/>
  <text x="90" y="334" font-family="Georgia,serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Bukavu</text>
</svg>
